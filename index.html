<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Decision Helper</title>
  <style>
    :root,
    [data-theme="dark"] {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9bb4;
      --accent: #5b9fd4;
      --accent-hover: #7ab3e0;
      --success: #3d9b6a;
      --danger: #c45c5c;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
      --radius: 10px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --btn-primary-text: #0a0e14;
      --theme-btn-bg: #243044;
      --table-header-bg: #141c28;
      --cell-hover: rgba(91, 159, 212, 0.08);
    }

    [data-theme="light"] {
      --bg: #f0f3f7;
      --surface: #ffffff;
      --surface2: #e8eef5;
      --border: #d0d8e4;
      --text: #1a2332;
      --muted: #5a6a80;
      --accent: #2b7cb8;
      --accent-hover: #1f6aa0;
      --success: #2a8a55;
      --danger: #c04040;
      --shadow: 0 4px 16px rgba(20, 40, 70, 0.08);
      --btn-primary-text: #ffffff;
      --theme-btn-bg: #e8eef5;
      --table-header-bg: #eef2f8;
      --cell-hover: rgba(43, 124, 184, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
      transition: background 0.2s, color 0.2s;
    }

    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header .header-text h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header .header-text p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .theme-toggle {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      background: var(--theme-btn-bg);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
    }

    .theme-toggle .icon {
      font-size: 1.05rem;
      line-height: 1;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.25rem;
      padding: 1.25rem;
      min-height: calc(100vh - 80px);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.85rem;
      font-weight: 600;
    }

    .field {
      margin-bottom: 0.75rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
    }

    .field textarea {
      font-size: 0.8rem;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace;
      resize: vertical;
      min-height: 88px;
      line-height: 1.35;
    }

    .field input[type="number"] {
      -moz-appearance: textfield;
    }

    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s, border-color 0.15s;
    }

    button.primary {
      background: var(--accent);
      color: var(--btn-primary-text);
      width: 100%;
    }

    button.primary:hover {
      background: var(--accent-hover);
    }

    button.primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.secondary {
      background: var(--theme-btn-bg);
      color: var(--text);
      border: 1px solid var(--border);
      width: 100%;
    }

    button.secondary:hover {
      border-color: var(--accent);
    }

    button.secondary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    button.danger-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      width: 100%;
      opacity: 0.9;
    }

    button.danger-btn:hover {
      background: rgba(196, 64, 64, 0.12);
      opacity: 1;
    }

    button.ghost {
      background: transparent;
      color: var(--muted);
      padding: 0.2rem 0.4rem;
      font-size: 0.75rem;
    }

    button.ghost:hover {
      color: var(--danger);
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .status-msg {
      font-size: 0.78rem;
      margin-top: 0.55rem;
      min-height: 1.1em;
      color: var(--muted);
    }

    .status-msg.ok {
      color: var(--success);
    }

    .status-msg.err {
      color: var(--danger);
    }

    .collection-list {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-top: 0.75rem;
      max-height: 280px;
      overflow-y: auto;
    }

    .collection-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.65rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .collection-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .collection-item-title {
      font-size: 0.875rem;
      font-weight: 600;
      word-break: break-word;
      line-height: 1.25;
    }

    .collection-item-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .collection-item-actions {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
    }

    .collection-item-actions button {
      flex: 1;
      min-width: 0;
      padding: 0.35rem 0.5rem;
      font-size: 0.78rem;
    }

    .collection-empty {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 0.75rem 0.25rem;
    }

    .main {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      min-width: 0;
    }

    .matrix-wrap {
      overflow: auto;
      max-width: 100%;
    }

    .matrix-empty {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 3rem 1.5rem;
    }

    .matrix {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 360px;
    }

    .matrix th,
    .matrix td {
      border: 1px solid var(--border);
      padding: 0.55rem 0.6rem;
      vertical-align: middle;
    }

    .matrix thead th {
      background: var(--table-header-bg);
      font-weight: 600;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .matrix .corner {
      text-align: left;
      min-width: 160px;
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--table-header-bg);
    }

    .matrix .option-head {
      min-width: 110px;
    }

    .matrix .option-name {
      word-break: break-word;
      line-height: 1.25;
      margin-bottom: 0.25rem;
    }

    .matrix .option-score {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }

    .matrix .indicator-cell {
      position: sticky;
      left: 0;
      z-index: 1;
      background: var(--surface);
      min-width: 160px;
      max-width: 240px;
    }

    .matrix tbody tr:hover .indicator-cell,
    .matrix tbody tr:hover td {
      background: var(--cell-hover);
    }

    .matrix tbody tr:hover .indicator-cell {
      background: var(--surface2);
    }

    .matrix .indicator-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .matrix .indicator-name {
      flex: 1;
      min-width: 0;
      word-break: break-word;
      font-size: 0.9rem;
      cursor: text;
      border-radius: 4px;
      padding: 0.15rem 0.25rem;
    }

    .matrix .indicator-name:hover {
      outline: 1px dashed var(--border);
    }

    .matrix .importance-col {
      width: 72px;
      min-width: 72px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 600;
      background: var(--table-header-bg);
    }

    .matrix .importance-cell {
      text-align: center;
      background: var(--surface);
      width: 72px;
    }

    .matrix tbody tr:hover .importance-cell {
      background: var(--surface2);
    }

    .matrix .importance-input {
      width: 100%;
      max-width: 56px;
      margin: 0 auto;
      display: block;
      text-align: center;
      padding: 0.35rem 0.2rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      outline: none;
      font-family: inherit;
      -moz-appearance: textfield;
    }

    .matrix .importance-input:focus {
      border-color: var(--accent);
    }

    .matrix .importance-input::-webkit-outer-spin-button,
    .matrix .importance-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .matrix .importance-share {
      display: block;
      margin-top: 0.2rem;
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .matrix-hint {
      margin-top: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .matrix .score-input {
      width: 100%;
      max-width: 88px;
      margin: 0 auto;
      display: block;
      text-align: center;
      padding: 0.4rem 0.35rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      outline: none;
      font-family: inherit;
      -moz-appearance: textfield;
    }

    .matrix .score-input:focus {
      border-color: var(--accent);
    }

    .matrix .score-input::-webkit-outer-spin-button,
    .matrix .score-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .matrix .totals-row th,
    .matrix .totals-row td {
      background: var(--table-header-bg);
      font-weight: 700;
    }

    .matrix .totals-label {
      position: sticky;
      left: 0;
      z-index: 1;
      text-align: left;
      background: var(--table-header-bg);
    }

    .matrix .total-cell {
      text-align: center;
      color: var(--accent);
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
    }

    .inline-edit {
      width: 100%;
      font-family: inherit;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 0.2rem 0.35rem;
      outline: none;
    }

    .chart-card h2 {
      margin-bottom: 1rem;
    }

    .chart-area {
      position: relative;
      height: 220px;
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      padding: 0 0.5rem 1.75rem;
      border-bottom: 1px solid var(--border);
    }

    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      min-width: 48px;
      max-width: 120px;
    }

    .bar {
      width: 100%;
      max-width: 64px;
      border-radius: 6px 6px 2px 2px;
      min-height: 2px;
      transition: height 0.35s ease, background 0.2s;
      position: relative;
    }

    .bar-value {
      position: absolute;
      top: -1.35rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .bar-label {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      word-break: break-word;
      max-width: 100%;
      line-height: 1.2;
    }

    .chart-empty {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 3rem 1rem;
      width: 100%;
    }

    .winner-badge {
      margin-top: 0.85rem;
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
    }

    .winner-badge strong {
      color: var(--success);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-text">
      <h1>Decision Helper</h1>
      <p>Indicators have importance; cells rate each option. Total = Σ (importance × score)</p>
    </div>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <span class="icon" id="theme-icon">☀️</span>
      <span id="theme-label">Light</span>
    </button>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="card">
        <h2>Scheme</h2>
        <div class="field" style="margin-bottom: 0">
          <label for="scheme-name">Name</label>
          <input
            id="scheme-name"
            type="text"
            placeholder="e.g. Which apartment to buy"
            autocomplete="off"
          />
        </div>
      </section>

      <section class="card">
        <h2>Collection</h2>
        <div class="btn-row">
          <button type="button" class="primary" id="save-collection-btn">
            Save to collection
          </button>
        </div>
        <div class="collection-list" id="collection-list"></div>
        <div class="status-msg" id="collection-status" role="status"></div>
      </section>

      <section class="card">
        <h2>New indicator</h2>
        <form id="indicator-form">
          <div class="field">
            <label for="indicator-name">Name</label>
            <input
              id="indicator-name"
              type="text"
              placeholder="e.g. price, location"
              required
              autocomplete="off"
            />
          </div>
          <div class="field">
            <label for="indicator-weight">Importance</label>
            <input
              id="indicator-weight"
              type="number"
              min="0"
              step="any"
              value="1"
              required
              title="How much this criterion matters. High importance stays dominant even if you add many minor indicators."
            />
          </div>
          <button type="submit" class="primary">Add indicator</button>
        </form>
      </section>

      <section class="card">
        <h2>New option</h2>
        <form id="option-form">
          <div class="field">
            <label for="option-name">Name</label>
            <input
              id="option-name"
              type="text"
              placeholder="e.g. apartment A"
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="primary">Add option</button>
        </form>
      </section>

      <section class="card">
        <h2>Share</h2>
        <div class="btn-row">
          <button type="button" class="secondary" id="export-btn">Copy JSON</button>
        </div>
        <div class="field" style="margin-top: 0.85rem; margin-bottom: 0.5rem">
          <label for="import-json">Paste JSON to import</label>
          <textarea
            id="import-json"
            placeholder='{"schemeName":"...","indicators":[{"id","name","weight"}],"options":[...],"scores":{...}}'
            spellcheck="false"
          ></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="primary" id="import-btn">Import</button>
          <button type="button" class="danger-btn" id="delete-scheme-btn">Delete scheme</button>
        </div>
        <div class="status-msg" id="share-status" role="status"></div>
      </section>
    </aside>

    <main class="main">
      <section class="card">
        <h2>Score matrix</h2>
        <div class="matrix-wrap" id="matrix-wrap"></div>
      </section>

      <section class="card chart-card">
        <h2>Score distribution</h2>
        <div class="chart-area" id="chart"></div>
        <div class="winner-badge" id="winner"></div>
      </section>
    </main>
  </div>

  <script>
    /**
     * @typedef {{ id: string, name: string, weight: number }} Indicator
     * @typedef {{ id: string, name: string }} Option
     * @typedef {Record<string, Record<string, number>>} ScoreMatrix
     * @typedef {{
     *   id: string,
     *   savedAt: string,
     *   schemeName: string,
     *   indicators: Indicator[],
     *   options: Option[],
     *   scores: ScoreMatrix
     * }} CollectionEntry
     */

    // —— Theme ——
    const themeToggle = document.getElementById("theme-toggle");
    const themeIcon = document.getElementById("theme-icon");
    const themeLabel = document.getElementById("theme-label");

    function getPreferredTheme() {
      const saved = localStorage.getItem("dh-theme");
      if (saved === "light" || saved === "dark") return saved;
      return window.matchMedia("(prefers-color-scheme: light)").matches
        ? "light"
        : "dark";
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("dh-theme", theme);
      if (theme === "dark") {
        themeIcon.textContent = "☀️";
        themeLabel.textContent = "Light";
      } else {
        themeIcon.textContent = "🌙";
        themeLabel.textContent = "Dark";
      }
    }

    applyTheme(getPreferredTheme());

    themeToggle.addEventListener("click", () => {
      const current =
        document.documentElement.getAttribute("data-theme") || "dark";
      applyTheme(current === "dark" ? "light" : "dark");
    });

    // —— State ——
    const STATE_KEY = "dh:state";
    const COLLECTION_KEY = "dh:collection";
    const SCHEMA_VERSION = 1;

    /** @type {Indicator[]} */
    let indicators = [];
    /** @type {Option[]} */
    let options = [];
    /** @type {ScoreMatrix} scores[indicatorId][optionId] */
    let scores = {};
    /** @type {string} */
    let schemeName = "";
    /** @type {string | null} */
    let activeCollectionId = null;
    /** @type {CollectionEntry[]} */
    let collection = [];

    const COLORS = [
      "#5b9fd4",
      "#3d9b6a",
      "#d4a05b",
      "#9b6ad4",
      "#d45b7a",
      "#5bc4c4",
      "#c4d45b",
      "#d47a5b",
    ];

    const matrixWrap = document.getElementById("matrix-wrap");
    const chartEl = document.getElementById("chart");
    const winnerEl = document.getElementById("winner");
    const indicatorForm = document.getElementById("indicator-form");
    const optionForm = document.getElementById("option-form");
    const schemeNameInput = document.getElementById("scheme-name");
    const exportBtn = document.getElementById("export-btn");
    const importBtn = document.getElementById("import-btn");
    const deleteSchemeBtn = document.getElementById("delete-scheme-btn");
    const saveCollectionBtn = document.getElementById("save-collection-btn");
    const importJson = document.getElementById("import-json");
    const shareStatus = document.getElementById("share-status");

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function emptyState() {
      return {
        schemeName: "",
        indicators: [],
        options: [],
        scores: {},
      };
    }

    function isEmptyBoard() {
      return (
        !schemeName.trim() &&
        indicators.length === 0 &&
        options.length === 0
      );
    }

    /** @param {string} indicatorId @param {string} optionId */
    function getScore(indicatorId, optionId) {
      const row = scores[indicatorId];
      if (!row) return 0;
      const v = row[optionId];
      return Number.isFinite(v) ? v : 0;
    }

    /** @param {Indicator} ind */
    function getImportance(ind) {
      const w = Number(ind.weight);
      return Number.isFinite(w) && w >= 0 ? w : 0;
    }

    function totalImportance() {
      return indicators.reduce((sum, ind) => sum + getImportance(ind), 0);
    }

    /**
     * Weighted total: Σ (importance × score).
     * Minor indicators with low importance cannot dilute a high-importance row.
     * @param {string} optionId
     */
    function scoreForOption(optionId) {
      return indicators.reduce(
        (sum, ind) => sum + getImportance(ind) * getScore(ind.id, optionId),
        0
      );
    }

    /** @param {number} n */
    function formatNum(n) {
      if (!Number.isFinite(n)) return "0";
      const rounded = Math.round(n * 1000) / 1000;
      if (Number.isInteger(rounded)) return String(rounded);
      return String(rounded);
    }

    /**
     * Keep scores only for known indicators/options; fill missing with 0.
     * @param {Indicator[]} inds
     * @param {Option[]} opts
     * @param {ScoreMatrix} raw
     * @returns {ScoreMatrix}
     */
    function normalizeScores(inds, opts, raw) {
      /** @type {ScoreMatrix} */
      const next = {};
      const src = raw && typeof raw === "object" ? raw : {};
      for (const ind of inds) {
        next[ind.id] = {};
        const srcRow =
          src[ind.id] && typeof src[ind.id] === "object" ? src[ind.id] : {};
        for (const opt of opts) {
          const v = Number(srcRow[opt.id]);
          next[ind.id][opt.id] = Number.isFinite(v) ? v : 0;
        }
      }
      return next;
    }

    /**
     * @param {unknown} data
     * @returns {{
     *   schemeName: string,
     *   indicators: Indicator[],
     *   options: Option[],
     *   scores: ScoreMatrix
     * }}
     */
    function parseDecisionData(data) {
      if (!data || typeof data !== "object") {
        throw new Error("Invalid JSON: expected an object");
      }
      const obj = /** @type {Record<string, unknown>} */ (data);

      const hasOptions = Array.isArray(obj.options);
      const hasIndicators = Array.isArray(obj.indicators);
      const hasName = typeof obj.schemeName === "string";
      if (!hasOptions && !hasIndicators && !hasName) {
        throw new Error(
          'Expected "schemeName" and/or "options"/"indicators"'
        );
      }

      const nextSchemeName =
        typeof obj.schemeName === "string" ? obj.schemeName : "";

      /** @type {Option[]} */
      const nextOptions = [];
      const optionIds = new Set();
      if (Array.isArray(obj.options)) {
        for (const o of obj.options) {
          if (
            !o ||
            typeof o !== "object" ||
            typeof o.id !== "string" ||
            typeof o.name !== "string" ||
            !String(o.name).trim()
          ) {
            continue;
          }
          if (optionIds.has(o.id)) continue;
          nextOptions.push({ id: o.id, name: String(o.name) });
          optionIds.add(o.id);
        }
      }

      /** @type {Indicator[]} */
      const nextIndicators = [];
      const indicatorIds = new Set();
      if (Array.isArray(obj.indicators)) {
        for (const item of obj.indicators) {
          if (
            !item ||
            typeof item !== "object" ||
            typeof item.id !== "string" ||
            typeof item.name !== "string" ||
            !String(item.name).trim()
          ) {
            continue;
          }
          if (indicatorIds.has(item.id)) continue;
          const w = Number(item.weight);
          nextIndicators.push({
            id: item.id,
            name: String(item.name),
            weight: Number.isFinite(w) && w >= 0 ? w : 1,
          });
          indicatorIds.add(item.id);
        }
      }

      const rawScores =
        obj.scores && typeof obj.scores === "object" ? obj.scores : {};

      return {
        schemeName: String(nextSchemeName),
        indicators: nextIndicators,
        options: nextOptions,
        scores: normalizeScores(nextIndicators, nextOptions, rawScores),
      };
    }

    /**
     * @param {{
     *   schemeName?: string,
     *   indicators: Indicator[],
     *   options: Option[],
     *   scores: ScoreMatrix
     * }} state
     * @param {{ collectionId?: string | null }} [meta]
     */
    function applyState(state, meta) {
      schemeName =
        typeof state.schemeName === "string" ? state.schemeName : "";
      indicators = state.indicators.map((i) => ({ ...i }));
      options = state.options.map((o) => ({ ...o }));
      scores = normalizeScores(indicators, options, state.scores || {});
      if (meta && "collectionId" in meta) {
        activeCollectionId = meta.collectionId ?? null;
      }
      syncSchemeNameInput();
      updateDocumentTitle();
    }

    function syncSchemeNameInput() {
      if (schemeNameInput.value !== schemeName) {
        schemeNameInput.value = schemeName;
      }
    }

    function updateDocumentTitle() {
      const trimmed = schemeName.trim();
      document.title = trimmed
        ? trimmed + " — Decision Helper"
        : "Decision Helper";
    }

    function snapshotCurrent() {
      return {
        schemeName,
        indicators: indicators.map((i) => ({
          id: i.id,
          name: i.name,
          weight: getImportance(i),
        })),
        options: options.map((o) => ({ ...o })),
        scores: normalizeScores(indicators, options, scores),
      };
    }

    function loadCollection() {
      try {
        const raw = localStorage.getItem(COLLECTION_KEY);
        if (!raw) {
          collection = [];
          return;
        }
        const data = JSON.parse(raw);
        if (!Array.isArray(data)) {
          collection = [];
          return;
        }
        /** @type {CollectionEntry[]} */
        const next = [];
        for (const item of data) {
          if (!item || typeof item !== "object" || typeof item.id !== "string") {
            continue;
          }
          try {
            const parsed = parseDecisionData(item);
            next.push({
              id: item.id,
              savedAt:
                typeof item.savedAt === "string"
                  ? item.savedAt
                  : new Date().toISOString(),
              schemeName: parsed.schemeName,
              indicators: parsed.indicators,
              options: parsed.options,
              scores: parsed.scores,
            });
          } catch {
            // skip broken entry
          }
        }
        collection = next;
      } catch {
        collection = [];
      }
    }

    function saveCollection() {
      try {
        localStorage.setItem(COLLECTION_KEY, JSON.stringify(collection));
      } catch {
        /* ignore */
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STATE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        applyState(parseDecisionData(data), {
          collectionId:
            typeof data.activeCollectionId === "string"
              ? data.activeCollectionId
              : null,
        });
      } catch {
        applyState(emptyState(), { collectionId: null });
      }
    }

    function getExportPayload() {
      return {
        version: SCHEMA_VERSION,
        exportedAt: new Date().toISOString(),
        schemeName,
        indicators,
        options,
        scores,
      };
    }

    function saveState() {
      try {
        localStorage.setItem(
          STATE_KEY,
          JSON.stringify({
            version: SCHEMA_VERSION,
            schemeName,
            indicators,
            options,
            scores,
            activeCollectionId,
          })
        );
      } catch {
        /* ignore */
      }
    }

    function formatSavedAt(iso) {
      try {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "";
        return d.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch {
        return "";
      }
    }

    function displaySchemeTitle(name) {
      const t = (name || "").trim();
      return t || "Untitled scheme";
    }

    // —— Status helpers ——
    let shareStatusTimer = null;
    let collectionStatusTimer = null;

    /** @param {string} text @param {"ok"|"err"|""} kind */
    function setShareStatus(text, kind) {
      shareStatus.textContent = text;
      shareStatus.className = "status-msg" + (kind ? " " + kind : "");
      clearTimeout(shareStatusTimer);
      if (text) {
        shareStatusTimer = setTimeout(() => {
          shareStatus.textContent = "";
          shareStatus.className = "status-msg";
        }, 3500);
      }
    }

    /** @param {string} text @param {"ok"|"err"|""} kind */
    function setCollectionStatus(text, kind) {
      const el = document.getElementById("collection-status");
      el.textContent = text;
      el.className = "status-msg" + (kind ? " " + kind : "");
      clearTimeout(collectionStatusTimer);
      if (text) {
        collectionStatusTimer = setTimeout(() => {
          el.textContent = "";
          el.className = "status-msg";
        }, 3500);
      }
    }

    // —— Matrix UI ——
    function renderMatrix() {
      matrixWrap.innerHTML = "";

      if (indicators.length === 0 && options.length === 0) {
        const empty = document.createElement("div");
        empty.className = "matrix-empty";
        empty.textContent =
          "Add indicators (with importance) and options, then score each option in the cells";
        matrixWrap.appendChild(empty);
        return;
      }

      const impTotal = totalImportance();
      const optionColCount = Math.max(options.length, 1);
      // Indicator + Importance + option columns
      const colSpanEmpty = optionColCount + 2;

      const table = document.createElement("table");
      table.className = "matrix";

      // Header
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");

      const corner = document.createElement("th");
      corner.className = "corner";
      corner.textContent = "Indicator";
      headRow.appendChild(corner);

      const impHead = document.createElement("th");
      impHead.className = "importance-col";
      impHead.textContent = "Imp.";
      impHead.title =
        "Importance of this criterion. Share % = weight / sum(weights)";
      headRow.appendChild(impHead);

      for (const opt of options) {
        const th = document.createElement("th");
        th.className = "option-head";

        const nameEl = document.createElement("div");
        nameEl.className = "option-name";
        nameEl.textContent = opt.name;
        nameEl.title = "Double-click to rename";
        nameEl.addEventListener("dblclick", () =>
          startTextEdit(nameEl, opt.name, (next) => {
            renameOption(opt.id, next);
          })
        );

        const scoreEl = document.createElement("div");
        scoreEl.className = "option-score";
        scoreEl.textContent = formatNum(scoreForOption(opt.id));
        scoreEl.title = "Σ (importance × score)";

        const del = document.createElement("button");
        del.type = "button";
        del.className = "ghost";
        del.textContent = "Delete";
        del.title = "Delete option";
        del.addEventListener("click", () => removeOption(opt.id));

        th.appendChild(nameEl);
        th.appendChild(scoreEl);
        th.appendChild(del);
        headRow.appendChild(th);
      }

      if (options.length === 0) {
        const th = document.createElement("th");
        th.className = "option-head";
        th.style.color = "var(--muted)";
        th.style.fontWeight = "500";
        th.textContent = "Add options →";
        headRow.appendChild(th);
      }

      thead.appendChild(headRow);
      table.appendChild(thead);

      // Body
      const tbody = document.createElement("tbody");

      if (indicators.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = colSpanEmpty;
        td.className = "matrix-empty";
        td.style.border = "none";
        td.textContent = "Add indicators to create rows";
        tr.appendChild(td);
        tbody.appendChild(tr);
      } else {
        for (const ind of indicators) {
          const tr = document.createElement("tr");
          const importance = getImportance(ind);
          const share =
            impTotal > 0 ? Math.round((importance / impTotal) * 1000) / 10 : 0;

          const nameTd = document.createElement("td");
          nameTd.className = "indicator-cell";

          const row = document.createElement("div");
          row.className = "indicator-row";

          const nameEl = document.createElement("span");
          nameEl.className = "indicator-name";
          nameEl.textContent = ind.name;
          nameEl.title = "Double-click to rename";
          nameEl.addEventListener("dblclick", () =>
            startTextEdit(nameEl, ind.name, (next) => {
              renameIndicator(ind.id, next);
            })
          );

          const del = document.createElement("button");
          del.type = "button";
          del.className = "ghost";
          del.textContent = "×";
          del.title = "Delete indicator";
          del.addEventListener("click", () => removeIndicator(ind.id));

          row.appendChild(nameEl);
          row.appendChild(del);
          nameTd.appendChild(row);
          tr.appendChild(nameTd);

          const impTd = document.createElement("td");
          impTd.className = "importance-cell";
          const impInput = document.createElement("input");
          impInput.className = "importance-input";
          impInput.type = "number";
          impInput.min = "0";
          impInput.step = "any";
          impInput.value = String(importance);
          impInput.title = "Importance (not diluted by adding minor indicators)";
          impInput.setAttribute("aria-label", "Importance: " + ind.name);
          impInput.addEventListener("change", () => {
            setIndicatorWeight(ind.id, impInput.value);
          });
          impInput.addEventListener("focus", () => impInput.select());
          const shareEl = document.createElement("span");
          shareEl.className = "importance-share";
          shareEl.textContent = formatNum(share) + "%";
          shareEl.title = "Share of total importance";
          impTd.appendChild(impInput);
          impTd.appendChild(shareEl);
          tr.appendChild(impTd);

          if (options.length === 0) {
            const td = document.createElement("td");
            td.style.color = "var(--muted)";
            td.style.fontSize = "0.8rem";
            td.style.textAlign = "center";
            td.textContent = "—";
            tr.appendChild(td);
          } else {
            for (const opt of options) {
              const td = document.createElement("td");
              const input = document.createElement("input");
              input.className = "score-input";
              input.type = "number";
              input.step = "any";
              input.value = String(getScore(ind.id, opt.id));
              input.title = "Score for this option (how well it fits the criterion)";
              input.setAttribute("aria-label", ind.name + " / " + opt.name);
              input.addEventListener("change", () => {
                setScore(ind.id, opt.id, input.value);
              });
              input.addEventListener("focus", () => input.select());
              td.appendChild(input);
              tr.appendChild(td);
            }
          }

          tbody.appendChild(tr);
        }
      }

      // Totals footer
      if (indicators.length > 0 && options.length > 0) {
        const foot = document.createElement("tr");
        foot.className = "totals-row";
        const label = document.createElement("th");
        label.className = "totals-label";
        label.colSpan = 2;
        label.textContent = "Weighted total";
        label.title = "Σ (importance × score)";
        foot.appendChild(label);
        for (const opt of options) {
          const td = document.createElement("td");
          td.className = "total-cell";
          td.textContent = formatNum(scoreForOption(opt.id));
          foot.appendChild(td);
        }
        tbody.appendChild(foot);
      }

      table.appendChild(tbody);
      matrixWrap.appendChild(table);

      const hint = document.createElement("p");
      hint.className = "matrix-hint";
      hint.textContent =
        "Importance (Imp.) is how much a criterion matters. Cell values are option scores. " +
        "Total = Σ (importance × score). Adding many low-importance rows barely moves the ranking.";
      matrixWrap.appendChild(hint);
    }

    /**
     * @param {HTMLElement} el
     * @param {string} current
     * @param {(next: string) => void} onCommit
     */
    function startTextEdit(el, current, onCommit) {
      const input = document.createElement("input");
      input.className = "inline-edit";
      input.type = "text";
      input.value = current;
      el.replaceWith(input);
      input.focus();
      input.select();

      let done = false;
      function finish(commit) {
        if (done) return;
        done = true;
        const next = input.value.trim();
        if (commit && next && next !== current) {
          onCommit(next);
        } else {
          render();
        }
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          finish(true);
        } else if (e.key === "Escape") {
          e.preventDefault();
          finish(false);
        }
      });
      input.addEventListener("blur", () => finish(true));
    }

    function renderChart() {
      chartEl.innerHTML = "";
      winnerEl.textContent = "";

      if (options.length === 0) {
        const empty = document.createElement("div");
        empty.className = "chart-empty";
        empty.textContent = "Add options to see the comparison";
        chartEl.appendChild(empty);
        return;
      }

      const scoreList = options.map((o) => ({
        name: o.name,
        score: scoreForOption(o.id),
      }));
      const max = Math.max(...scoreList.map((s) => s.score), 1);

      scoreList.forEach((s, i) => {
        const group = document.createElement("div");
        group.className = "bar-group";

        const bar = document.createElement("div");
        bar.className = "bar";
        const pct = (s.score / max) * 100;
        bar.style.height = Math.max(pct, s.score > 0 ? 4 : 2) + "%";
        bar.style.background = COLORS[i % COLORS.length];

        const val = document.createElement("span");
        val.className = "bar-value";
        val.textContent = formatNum(s.score);
        bar.appendChild(val);

        const label = document.createElement("div");
        label.className = "bar-label";
        label.textContent = s.name;

        group.appendChild(bar);
        group.appendChild(label);
        chartEl.appendChild(group);
      });

      const maxScore = Math.max(...scoreList.map((s) => s.score));
      if (maxScore > 0) {
        const leaders = scoreList.filter((s) => s.score === maxScore);
        if (leaders.length === 1) {
          winnerEl.innerHTML =
            "Leader: <strong></strong> — " + formatNum(maxScore) + " pts";
          winnerEl.querySelector("strong").textContent = leaders[0].name;
        } else {
          winnerEl.textContent =
            "Tie: " +
            leaders.map((l) => l.name).join(", ") +
            " — " +
            formatNum(maxScore) +
            " pts each";
        }
      } else {
        winnerEl.textContent = "Set importance and scores in the matrix";
      }
    }

    function renderCollection() {
      const listEl = document.getElementById("collection-list");
      listEl.innerHTML = "";

      if (collection.length === 0) {
        const empty = document.createElement("div");
        empty.className = "collection-empty";
        empty.textContent = "No saved schemes yet";
        listEl.appendChild(empty);
        return;
      }

      const sorted = collection
        .slice()
        .sort((a, b) => String(b.savedAt).localeCompare(String(a.savedAt)));

      for (const entry of sorted) {
        const item = document.createElement("div");
        item.className =
          "collection-item" +
          (entry.id === activeCollectionId ? " active" : "");

        const title = document.createElement("div");
        title.className = "collection-item-title";
        title.textContent = displaySchemeTitle(entry.schemeName);

        const meta = document.createElement("div");
        meta.className = "collection-item-meta";
        meta.textContent =
          entry.options.length +
          " options · " +
          entry.indicators.length +
          " indicators" +
          (entry.savedAt ? " · " + formatSavedAt(entry.savedAt) : "");

        const actions = document.createElement("div");
        actions.className = "collection-item-actions";

        const openBtn = document.createElement("button");
        openBtn.type = "button";
        openBtn.className = "secondary";
        openBtn.textContent =
          entry.id === activeCollectionId ? "Current" : "Open";
        openBtn.disabled = entry.id === activeCollectionId;
        openBtn.addEventListener("click", () => openFromCollection(entry.id));

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "danger-btn";
        delBtn.textContent = "Remove";
        delBtn.addEventListener("click", () => removeFromCollection(entry.id));

        actions.appendChild(openBtn);
        actions.appendChild(delBtn);
        item.appendChild(title);
        item.appendChild(meta);
        item.appendChild(actions);
        listEl.appendChild(item);
      }
    }

    function render() {
      renderMatrix();
      renderChart();
      renderCollection();
      saveState();
    }

    // —— Mutations ——
    function setScore(indicatorId, optionId, raw) {
      const n = Number(raw);
      const value = Number.isFinite(n) ? n : 0;
      if (!scores[indicatorId]) scores[indicatorId] = {};
      scores[indicatorId][optionId] = value;
      render();
    }

    function setIndicatorWeight(id, raw) {
      const ind = indicators.find((i) => i.id === id);
      if (!ind) return;
      const n = Number(raw);
      ind.weight = Number.isFinite(n) && n >= 0 ? n : 0;
      render();
    }

    function renameIndicator(id, name) {
      const ind = indicators.find((i) => i.id === id);
      if (!ind) return;
      ind.name = name;
      render();
    }

    function renameOption(id, name) {
      const opt = options.find((o) => o.id === id);
      if (!opt) return;
      opt.name = name;
      render();
    }

    function removeIndicator(id) {
      indicators = indicators.filter((i) => i.id !== id);
      delete scores[id];
      render();
    }

    function removeOption(id) {
      options = options.filter((o) => o.id !== id);
      for (const indId of Object.keys(scores)) {
        if (scores[indId]) delete scores[indId][id];
      }
      render();
    }

    function saveToCollection() {
      if (isEmptyBoard()) {
        setCollectionStatus("Nothing to save", "err");
        return;
      }

      const snap = snapshotCurrent();
      const now = new Date().toISOString();
      const existingIdx = activeCollectionId
        ? collection.findIndex((e) => e.id === activeCollectionId)
        : -1;

      if (existingIdx >= 0) {
        collection[existingIdx] = {
          ...collection[existingIdx],
          savedAt: now,
          schemeName: snap.schemeName,
          indicators: snap.indicators,
          options: snap.options,
          scores: snap.scores,
        };
        saveCollection();
        renderCollection();
        setCollectionStatus("Scheme updated in collection", "ok");
        return;
      }

      const id = uid();
      collection.push({
        id,
        savedAt: now,
        schemeName: snap.schemeName,
        indicators: snap.indicators,
        options: snap.options,
        scores: snap.scores,
      });
      activeCollectionId = id;
      saveCollection();
      saveState();
      renderCollection();
      setCollectionStatus("Scheme saved to collection", "ok");
    }

    function openFromCollection(id) {
      const entry = collection.find((e) => e.id === id);
      if (!entry) return;

      if (activeCollectionId !== id && !isEmptyBoard()) {
        const ok = window.confirm(
          "Open this scheme? Unsaved changes to the current board will be lost."
        );
        if (!ok) return;
      }

      applyState(
        {
          schemeName: entry.schemeName,
          indicators: entry.indicators,
          options: entry.options,
          scores: entry.scores,
        },
        { collectionId: entry.id }
      );
      render();
      setCollectionStatus(
        "Opened “" + displaySchemeTitle(entry.schemeName) + "”",
        "ok"
      );
    }

    function removeFromCollection(id) {
      const entry = collection.find((e) => e.id === id);
      if (!entry) return;
      const ok = window.confirm(
        "Remove “" +
          displaySchemeTitle(entry.schemeName) +
          "” from the collection?"
      );
      if (!ok) return;

      collection = collection.filter((e) => e.id !== id);
      if (activeCollectionId === id) {
        activeCollectionId = null;
        saveState();
      }
      saveCollection();
      renderCollection();
      setCollectionStatus("Removed from collection", "ok");
    }

    // —— Events ——
    schemeNameInput.addEventListener("input", () => {
      schemeName = schemeNameInput.value;
      updateDocumentTitle();
      saveState();
    });

    saveCollectionBtn.addEventListener("click", () => saveToCollection());

    indicatorForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const nameInput = document.getElementById("indicator-name");
      const weightInput = document.getElementById("indicator-weight");
      const name = nameInput.value.trim();
      const weight = Number(weightInput.value);
      if (!name) return;
      if (!Number.isFinite(weight) || weight < 0) return;

      const id = uid();
      indicators.push({ id, name, weight });
      scores[id] = {};
      for (const opt of options) {
        scores[id][opt.id] = 0;
      }

      nameInput.value = "";
      weightInput.value = "1";
      nameInput.focus();
      render();
    });

    optionForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const nameInput = document.getElementById("option-name");
      const name = nameInput.value.trim();
      if (!name) return;

      const id = uid();
      options.push({ id, name });
      for (const ind of indicators) {
        if (!scores[ind.id]) scores[ind.id] = {};
        scores[ind.id][id] = 0;
      }

      nameInput.value = "";
      nameInput.focus();
      render();
    });

    exportBtn.addEventListener("click", async () => {
      const json = JSON.stringify(getExportPayload(), null, 2);
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(json);
        } else {
          importJson.value = json;
          importJson.focus();
          importJson.select();
          const ok = document.execCommand("copy");
          if (!ok) throw new Error("copy failed");
        }
        setShareStatus("JSON copied to clipboard", "ok");
      } catch {
        importJson.value = json;
        importJson.focus();
        importJson.select();
        setShareStatus("Could not copy — JSON is in the field below", "err");
      }
    });

    deleteSchemeBtn.addEventListener("click", () => {
      if (isEmptyBoard()) {
        setShareStatus("Nothing to delete", "err");
        return;
      }
      const ok = window.confirm(
        "Clear the current board? Name, indicators, options, and scores will be removed. (Collection is kept.)"
      );
      if (!ok) return;
      applyState(emptyState(), { collectionId: null });
      importJson.value = "";
      render();
      setShareStatus("Scheme cleared", "ok");
    });

    importBtn.addEventListener("click", () => {
      const raw = importJson.value.trim();
      if (!raw) {
        setShareStatus("Paste JSON first", "err");
        return;
      }

      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        setShareStatus("Invalid JSON syntax", "err");
        return;
      }

      try {
        const state = parseDecisionData(data);
        if (
          state.options.length === 0 &&
          state.indicators.length === 0 &&
          !state.schemeName.trim()
        ) {
          setShareStatus("No valid scheme data found", "err");
          return;
        }

        if (!isEmptyBoard()) {
          const ok = window.confirm(
            "Import will replace your current board. Continue?"
          );
          if (!ok) return;
        }

        applyState(state, { collectionId: null });
        render();
        importJson.value = "";
        setShareStatus(
          "Imported: " +
            (state.schemeName.trim()
              ? "“" + state.schemeName.trim() + "”, "
              : "") +
            state.options.length +
            " options, " +
            state.indicators.length +
            " indicators",
          "ok"
        );
      } catch (err) {
        setShareStatus(
          err instanceof Error ? err.message : "Import failed",
          "err"
        );
      }
    });

    // —— Boot ——
    loadCollection();
    loadState();
    if (
      activeCollectionId &&
      !collection.some((e) => e.id === activeCollectionId)
    ) {
      activeCollectionId = null;
    }
    render();
  </script>
</body>
</html>
